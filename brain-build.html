<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brain network build-up</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      brain-network-visual,
      brain-network-visual canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <brain-network-visual
      id="viz"
      mesh-src="data/brain_mesh_fine.json"
      tracts-src="data/tracts_fine.json"
      head-src="data/head_mesh.json"
      center-x="0.5"
      center-y="0.5"
      stage="0"
      alpha="1"
      mesh-alpha="1"
      tract-alpha="0.96"
      node-alpha="0.95"
      pulse-alpha="0.95"
      field-alpha="0.82"
    ></brain-network-visual>
    <script>
      // staged build-up: stage 1 brain · 2 +tracts · 3 +dynamics · 4 +nodes.
      // ?stage=N sets the initial stage (handy for previewing a single layer).
      var _q = new URLSearchParams(location.search).get("stage");
      if (_q !== null) document.getElementById("viz").setAttribute("stage", _q);
      // the parent slide drives the build-up by posting {ch1stage:N}
      window.addEventListener("message", function (event) {
        var data = event.data || {};
        if (typeof data.ch1stage === "number") {
          var v = document.getElementById("viz");
          if (v && v.setStage) v.setStage(data.ch1stage);
        }
      });
    </script>
    <script type="module" src="js/home-visual.js"></script>
  </body>
</html>
