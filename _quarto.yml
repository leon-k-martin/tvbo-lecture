# TVB-O Lecture — standalone reveal.js slide deck
project:
  type: default
  render:
    - index.qmd

# Render straight from the committed _freeze/ cache — no Python kernel or data
# pipeline is needed to build the slides. Delete the cache (or set this to "auto"
# and provide the upstream data/code) only if you want to re-execute the figures.
execute:
  freeze: true

bibliography: bibliography.bib
